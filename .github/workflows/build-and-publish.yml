name: Build and publish Element Web image

on:
  push:
    branches:
      - main
    paths:
      - '.github/element-web-version.txt'
      - 'docker/Dockerfile'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Element Web version
        id: version
        run: |
          version=$(grep -v '^#' .github/element-web-version.txt | tr -d '[:space:]')
          if [[ ! "$version" =~ ^v ]]; then
            echo "Version must start with 'v'. Got: $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect upstream runtime user
        id: upstream-user
        run: |
          original_user=$(docker buildx imagetools inspect "docker.io/vectorim/element-web:${{ steps.version.outputs.value }}" --format "{{.Config.User}}")
          if [ -z "$original_user" ]; then
            original_user=root
          fi
          echo "value=$original_user" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/element-web
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            ELEMENT_WEB_VERSION=${{ steps.version.outputs.value }}
            ORIGINAL_USER=${{ steps.upstream-user.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
